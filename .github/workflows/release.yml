name: Release
on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.lein
          key: build-${{ hashFiles('modules/jetty-shaded/pom.xml', 'project.clj') }}
          restore-keys: build-
      - name: Derive release version from tag
        id: ver
        run: |
          TAG=${GITHUB_REF_NAME#v}
          case "$TAG" in
            *SNAPSHOT*) echo "Refusing to release a SNAPSHOT tag: $TAG"; exit 1 ;;
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Tag '$TAG' is not a semver release"; exit 1 ;;
          esac
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
      - name: Stamp release version into all modules
        run: make set-version VERSION=${{ steps.ver.outputs.version }}
      - name: Build and deploy all artifacts
        run: make deploy
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
